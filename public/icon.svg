<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background image frame -->
  <rect x="8" y="8" width="48" height="48" rx="4" fill="#e4e7eb" stroke="#0079bf" stroke-width="2"/>

  <!-- Mountains/landscape (simple annotation target) -->
  <path d="M 12 40 L 22 28 L 32 38 L 42 24 L 52 36 L 52 52 L 12 52 Z" fill="#5e6c84"/>

  <!-- Sun/circle in sky -->
  <circle cx="45" cy="20" r="5" fill="#ffab4a"/>

  <!-- Annotation pin marker -->
  <g transform="translate(38, 16)">
    <!-- Pin shadow -->
    <ellipse cx="2" cy="28" rx="3" ry="1.5" fill="rgba(0,0,0,0.2)"/>

    <!-- Pin body -->
    <circle cx="0" cy="0" r="8" fill="#ff5722" stroke="white" stroke-width="2"/>

    <!-- Pin number -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">1</text>

    <!-- Pin stick -->
    <line x1="0" y1="8" x2="0" y2="26" stroke="#ff5722" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Drawing line accent -->
  <path d="M 14 18 Q 18 16 22 18 T 30 18" stroke="#4caf50" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
